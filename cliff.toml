# git-cliff configuration for ytdl-sub-status
#
# Commit subjects in this repo lead with a bracketed tag:
#   [NEW] / [FIXED] / [DROP] / [CHANGED] / [DOCS] / [INTERNAL]
# git-cliff parses those tags and groups commits into the corresponding
# Keep-a-Changelog sections. [INTERNAL] commits are skipped.
#
# Usage:
#   git cliff --tag vX.Y.Z -o CHANGELOG.md   # full changelog
#   git cliff --unreleased --tag vX.Y.Z      # preview the next release section

[changelog]
# Header lives in CHANGELOG.md itself (written once, by hand). Cliff only
# emits release sections so --prepend doesn't duplicate the header.
header = ""
body = """
{% if commits | length == 0 %}{% else %}\
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | replace(from="[NEW] ", to="") | replace(from="[FIXED] ", to="") | replace(from="[DROP] ", to="") | replace(from="[CHANGED] ", to="") | replace(from="[DOCS] ", to="") | replace(from="[INTERNAL] ", to="") | trim | upper_first }}\
{% endfor %}
{% endfor %}\n
{% endif %}\
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "newest"

# Map each tag to a Keep-a-Changelog section. [INTERNAL] is skipped.
commit_parsers = [
    { message = "^\\[NEW\\]",      group = "Added" },
    { message = "^\\[FIXED\\]",    group = "Fixed" },
    { message = "^\\[DROP\\]",     group = "Removed" },
    { message = "^\\[CHANGED\\]",  group = "Changed" },
    { message = "^\\[DOCS\\]",     group = "Documentation" },
    { message = "^\\[INTERNAL\\]", skip = true },
    # Anything else (legacy commits, release commits) is dropped from output.
    { message = ".*", skip = true },
]
